<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>NetRisk Web GUI</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            body {
                font-family: system-ui, Segoe UI, Arial, sans-serif;
                margin: 0;
            }
            header {
                padding: 12px 16px;
                border-bottom: 1px solid #ddd;
                display: flex;
                gap: 16px;
                align-items: center;
            }
            main {
                padding: 16px;
                display: grid;
                gap: 16px;
            }
            .row {
                display: grid;
                grid-template-columns: auto 1fr auto;
                gap: 8px;
                align-items: center;
            }
            .card {
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 12px;
            }
            input,
            select,
            button {
                padding: 6px 8px;
                font-size: 14px;
            }
            pre {
                white-space: pre-wrap;
                font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th,
            td {
                border-bottom: 1px solid #eee;
                text-align: left;
                padding: 6px 8px;
            }
        </style>
    </head>
    <body>
        <header>
            <!-- <h2 style="margin: 0">NetRisk Web GUI</h2> -->
            <span id="status" style="color: #888">idle</span>
        </header>

        <main>
            <section class="card">
                <div class="row">
                    <label>Interface</label>
                    <select id="iface"></select>
                    <button onclick="refreshIfaces()">Refresh</button>
                </div>
                <div class="row" style="margin-top: 8px">
                    <label>PCAP</label>
                    <input id="pcap" value="capture_live.pcap" />
                </div>
                <!-- <div class="row" style="margin-top: 8px"> -->
                <!-- <label>Count</label> -->
                <!-- <input id="count" type="number" value="0" min="0" /> -->
                <!-- </div> -->
                <div class="row" style="margin-top: 8px">
                    <label>Seconds</label>
                    <input id="seconds" type="number" value="8" min="0" />
                </div>
                <div style="margin-top: 10px">
                    <button onclick="startCap()">Start</button>
                    <!-- <button onclick="stopCap()">Stop</button> -->
                </div>
            </section>

            <section class="card">
                <div class="row">
                    <label>Features CSV</label>
                    <input id="features" value="features.csv" />
                    <span></span>
                </div>
                <!-- <div class="row" style="margin-top: 8px">
                    <label>Model joblib</label>
                    <input id="model" value="model.joblib" />
                    <span></span>
                </div> -->
                <div class="row" style="margin-top: 8px">
                    <label>Scored CSV</label>
                    <input id="scored" value="scored.csv" />
                    <button onclick="score()">Score</button>
                    <a id="downloadScored" href="#" style="margin-left: 12px; display: none"> Scored CSV </a>
                    <a id="downloadPcap" href="#" style="margin-left: 12px; display: none">PCAP</a>
                </div>
            </section>

            <section class="card" id="topResult" hidden>
                <h3 style="margin-top: 0">Top Results</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Risk</th>
                            <th>Summary</th>
                        </tr>
                    </thead>
                    <tbody id="rows"></tbody>
                </table>
            </section>

            <section class="card">
                <h3 style="margin-top: 0">Logs</h3>
                <pre id="logs" style="height: 260px; overflow: auto"></pre>
            </section>
        </main>

        <script>
            let ws = null;
            function log(t) {
                const el = document.getElementById("logs");
                el.textContent += t + "\n";
                el.scrollTop = el.scrollHeight;
            }
            function setStatus(s) {
                document.getElementById("status").textContent = s;
            }

            async function refreshIfaces() {
                const sel = document.getElementById("iface");
                sel.innerHTML = "";
                const res = await fetch("/api/interfaces");
                const data = await res.json();
                for (const it of data) {
                    const o = document.createElement("option");
                    o.value = it.device;
                    o.textContent = it.display;
                    sel.appendChild(o);
                }
                setStatus("interfaces loaded: " + data.length);
            }

            async function startCap() {
                const iface = document.getElementById("iface").value;

                if (!iface) {
                    alert("Pick an interface");
                    return;
                }

                setStatus("capturing...");

                const body = {
                    iface,
                    pcap: document.getElementById("pcap").value,
                    features_csv: document.getElementById("features").value,
                    seconds: parseInt(document.getElementById("seconds").value || "0"),
                };

                const res = await fetch("/api/start", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(JSON.stringify(data));
                    return;
                }

                log("START: " + (data.cmd || []).join(" ") + "\n");

                log("Capturing");

                if (ws) {
                    try {
                        ws.close();
                    } catch {}
                }

                ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");

                ws.onopen = () => {
                    setStatus("Captured");
                    log("\nCaptured");
                    log("PCAP         : " + body.pcap);
                    log("Features CSV : " + body.features_csv + "\n");
                };

                // ws.onmessage = (e) => {
                //     const msg = e.data;
                //     log(msg);

                //     // when main.py ends, app.py broadcasts: "[process-exit] code=…"
                //     if (msg.startsWith("[process-exit]")) {
                //         setStatus("Captured");
                //         // make downloads visible
                //         const pcap = document.getElementById("pcap").value;
                //         const feat = document.getElementById("features").value;
                //         const a = document.getElementById("downloadScored");
                //         a.href = "/download?path=" + encodeURIComponent(feat);
                //         a.style.display = "inline-block";
                //         a.textContent = "Download " + feat;

                //         // optional: also offer pcap download if you add a second link
                //         document.getElementById("downloadPcap").href = "/download?path=" + encodeURIComponent(pcap);
                //         document.getElementById("downloadPcap").style.display = "inline-block";
                //     }
                // };
                // ws.onclose = () => log("[ws] disconnected");
            }

            async function stopCap() {
                await fetch("/api/stop", { method: "POST" });
                setStatus("stopped");
            }

            async function score() {
                const body = {
                    features_csv: document.getElementById("features").value,
                    out_csv: document.getElementById("scored").value,
                };

                const res = await fetch("/api/score", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
                const data = await res.json();

                if (!res.ok) {
                    alert(JSON.stringify(data));
                    return;
                }

                document.getElementById("topResult").hidden = false;
                const tb = document.getElementById("rows");
                tb.innerHTML = "";

                for (const r of data.rows) {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `<td>${r.idx}</td><td>${r.risk}</td><td>${r.summary || ""}</td>`;
                    tb.appendChild(tr);
                }

                const a = document.getElementById("downloadScored");
                a.href = "/download?path=" + encodeURIComponent(data.out_csv);
                a.style.display = "inline-block";
                a.textContent = "Download " + data.out_csv;

                setStatus("scored");

                log("Scored       : " + data.out_csv);
            }
            refreshIfaces();
        </script>
    </body>
</html>
